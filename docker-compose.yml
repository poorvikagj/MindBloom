services:
  db:
    image: mysql:8.0
    command: --default-authentication-plugin=mysql_native_password
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: project
      MYSQL_USER: mindbloom
      MYSQL_PASSWORD: mindbloompass
    volumes:
      - db_data:/var/lib/mysql
      - ./schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-prootpassword"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 20s

  app:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 8000
      DB_HOST: db
      DB_PORT: 3306
      DB_USER: mindbloom
      DB_PASSWORD: mindbloompass
      DB_NAME: project
      SESSION_SECRET: mindbloom-session-secret
      COOKIE_SECRET: mindbloom-cookie-secret
      COOKIE_SECURE: false
    ports:
      - "8000:8000"
    command: sh -c "npm run seed && npm start"

volumes:
  db_data:
