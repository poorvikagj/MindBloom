services:
  backend:
    image: poorvikagj/mindbloom:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mindbloom-backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 5000
    env_file:
      - ./.env
    ports:
      - "5000:5000"
    volumes:
      - ./public/uploads:/app/public/uploads
    networks:
      - mindbloom-network

networks:
  mindbloom-network:
    driver: bridge

volumes: {}
